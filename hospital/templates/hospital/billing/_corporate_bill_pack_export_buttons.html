{% comment %}Include with payer in context.{% endcomment %}
<div class="d-flex flex-wrap gap-2 align-items-center corporate-bill-pack-export-btns">
    <button type="button" class="btn btn-sm btn-dark" onclick="window.print();" title="Print this page">
        <i class="bi bi-printer"></i> Print
    </button>
    <a href="{% url 'corporate_bill_pack_export_excel' payer_id=payer.pk %}" class="btn btn-sm btn-primary" title="Download Excel (.xlsx)">
        <i class="bi bi-file-earmark-spreadsheet"></i> Excel
    </a>
    <a href="{% url 'corporate_bill_pack_export_csv' payer_id=payer.pk %}" class="btn btn-sm btn-outline-primary" title="Download CSV">
        <i class="bi bi-file-earmark-text"></i> CSV
    </a>
</div>
