{% extends 'hospital/base.html' %}
{% load humanize %}

{% block title %}Edit Service - HMS{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1><i class="bi bi-pencil"></i> Edit Service</h1>
                <a href="{% url 'hospital:service_list' %}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left"></i> Back to List
                </a>
            </div>

            <div class="card">
                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="code" class="form-label">Service Code <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="code" name="code" required 
                                   value="{{ service.code }}" maxlength="20" title="Enter text" placeholder="Enter text">
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label">Service Description <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="description" name="description" required
                                   value="{{ service.description }}" title="Enter text" placeholder="Enter text">
                        </div>

                        <div class="mb-3">
                            <label for="category" class="form-label">Category</label>
                            <input type="text" class="form-control" id="category" name="category" list="categories"
                                   value="{{ service.category }}" title="Enter text" placeholder="Enter text">
                            <datalist id="categories">
                                {% for cat in categories %}
                                <option value="{{ cat }}">
                                {% endfor %}
                            </datalist>
                        </div>

                        <div class="mb-3">
                            <label for="default_price" class="form-label">Default Price (GHS)</label>
                            <input type="number" class="form-control" id="default_price" name="default_price" 
                                   step="0.01" min="0" value="{% if default_price %}{{ default_price.price }}{% endif %}" title="Enter number" placeholder="Enter number">
                        </div>

                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="is_active" name="is_active" 
                                   {% if service.is_active %}checked{% endif %}>
                            <label class="form-check-label" for="is_active">
                                Active (available for billing)
                            </label>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="{% url 'hospital:service_list' %}" class="btn btn-secondary">
                                <i class="bi bi-x-circle"></i> Cancel
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle"></i> Update Service
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
