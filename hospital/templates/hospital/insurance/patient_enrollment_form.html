{% extends 'hospital/base.html' %}
{% load static %}

{% block content %}
<div class="container" style="max-width: 800px; margin: 40px auto;">
    <div class="card">
        <div class="card-header bg-success text-white">
            <h4 class="mb-0"><i class="bi bi-person-check me-2"></i>Enroll {{ patient.full_name }} in Insurance</h4>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                
                <div class="alert alert-info">
                    <strong>Patient:</strong> {{ patient.full_name }} ({{ patient.mrn }})
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Insurance Company *</label>
                        <select name="insurance_company" class="form-select" required id="id_insurance_company" title="Select option" aria-label="Select option">
                            <option value="">Select company...</option>
                            {% for company in companies %}
                            <option value="{{ company.id }}">{{ company.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Insurance Plan</label>
                        <select name="insurance_plan" class="form-select" id="id_insurance_plan" title="Select option" aria-label="Select option">
                            <option value="">Select plan...</option>
                        </select>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Policy Number *</label>
                        <input type="text" name="policy_number" class="form-control" required title="Enter text" placeholder="Enter text">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Member ID *</label>
                        <input type="text" name="member_id" class="form-control" required title="Enter text" placeholder="Enter text">
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Effective Date *</label>
                        <input type="date" name="effective_date" class="form-control" required value="{{ today }}">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Expiry Date</label>
                        <input type="date" name="expiry_date" class="form-control">
                    </div>
                </div>
                
                <div class="mb-3">
                    <div class="form-check">
                        <input type="checkbox" name="is_primary" class="form-check-input" id="is_primary" checked>
                        <label class="form-check-label" for="is_primary">
                            This is the patient's primary insurance
                        </label>
                    </div>
                </div>
                
                <div class="mb-3">
                    <div class="form-check">
                        <input type="checkbox" name="is_primary_subscriber" class="form-check-input" id="is_subscriber" checked>
                        <label class="form-check-label" for="is_subscriber">
                            Patient is the primary policy holder
                        </label>
                    </div>
                </div>
                
                <div class="d-flex justify-content-between mt-4">
                    <a href="{% url 'hospital:patient_detail' patient.pk %}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left me-2"></i>Cancel
                    </a>
                    <button type="submit" class="btn btn-success btn-lg">
                        <i class="bi bi-check-circle me-2"></i>Enroll Patient
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
// Load insurance plans when company is selected
document.getElementById('id_insurance_company')?.addEventListener('change', function() {
    const companyId = this.value;
    const planSelect = document.getElementById('id_insurance_plan');
    
    if (!companyId) {
        planSelect.innerHTML = '<option value="">Select plan...</option>';
        return;
    }
    
    fetch(`/hms/api/insurance/companies/${companyId}/plans/`)
        .then(response => response.json())
        .then(data => {
            planSelect.innerHTML = '<option value="">Select plan...</option>';
            data.plans.forEach(plan => {
                const option = document.createElement('option');
                option.value = plan.id;
                option.textContent = `${plan.plan_name} (${plan.plan_code})`;
                planSelect.appendChild(option);
            });
        })
        .catch(error => console.error('Error loading plans:', error));
});
</script>
{% endblock %}
