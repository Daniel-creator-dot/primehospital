{% extends 'hospital/base.html' %}
{% load static %}

{% block content %}
<div class="container" style="max-width: 900px; margin: 40px auto;">
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0"><i class="bi bi-plus-circle me-2"></i>Add Insurance Plan for {{ company.name }}</h4>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                
                <!-- Basic Info -->
                <h5 class="mb-3">Basic Information</h5>
                <div class="row">
                    <div class="col-md-8 mb-3">
                        <label class="form-label">Plan Name *</label>
                        <input type="text" name="plan_name" class="form-control" required placeholder="e.g., Basic Plan" title="Enter text" placeholder="Enter text">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Plan Code *</label>
                        <input type="text" name="plan_code" class="form-control" required placeholder="e.g., BASIC" style="text-transform: uppercase;" title="Enter text" placeholder="Enter text">
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Plan Type</label>
                        <select name="plan_type" class="form-select" title="Select option" aria-label="Select option">
                            <option value="individual">Individual Plan</option>
                            <option value="family">Family Plan</option>
                            <option value="corporate">Corporate Plan</option>
                            <option value="basic">Basic Coverage</option>
                            <option value="standard">Standard Coverage</option>
                            <option value="premium">Premium Coverage</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Effective Date *</label>
                        <input type="date" name="effective_date" class="form-control" required value="{{ today }}">
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="3" placeholder="What does this plan cover?"></textarea>
                </div>
                
                <hr class="my-4">
                
                <!-- Coverage Percentages -->
                <h5 class="mb-3">Coverage Percentages (What insurance pays)</h5>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Consultations %</label>
                        <input type="number" name="consultation_coverage" class="form-control" value="100" min="0" max="100" step="0.01" title="Enter number" placeholder="Enter number">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Lab Tests %</label>
                        <input type="number" name="lab_coverage" class="form-control" value="100" min="0" max="100" step="0.01" title="Enter number" placeholder="Enter number">
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Imaging/X-rays %</label>
                        <input type="number" name="imaging_coverage" class="form-control" value="100" min="0" max="100" step="0.01" title="Enter number" placeholder="Enter number">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Pharmacy %</label>
                        <input type="number" name="pharmacy_coverage" class="form-control" value="80" min="0" max="100" step="0.01" title="Enter number" placeholder="Enter number">
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Surgery %</label>
                        <input type="number" name="surgery_coverage" class="form-control" value="90" min="0" max="100" step="0.01" title="Enter number" placeholder="Enter number">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Admission %</label>
                        <input type="number" name="admission_coverage" class="form-control" value="100" min="0" max="100" step="0.01" title="Enter number" placeholder="Enter number">
                    </div>
                </div>
                
                <hr class="my-4">
                
                <!-- Limits -->
                <h5 class="mb-3">Limits & Restrictions</h5>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Annual Limit (GHS)</label>
                        <input type="number" name="annual_limit" class="form-control" placeholder="Leave blank for unlimited" step="0.01" title="Enter number" placeholder="Enter number">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Copay Amount (GHS)</label>
                        <input type="number" name="copay_amount" class="form-control" value="0" min="0" step="0.01" title="Enter number" placeholder="Enter number">
                    </div>
                </div>
                
                <div class="mb-3">
                    <div class="form-check">
                        <input type="checkbox" name="requires_pre_authorization" class="form-check-input" id="preauth">
                        <label class="form-check-label" for="preauth">
                            Requires Pre-Authorization for major procedures
                        </label>
                    </div>
                </div>
                
                <!-- Submit -->
                <div class="d-flex justify-content-between mt-4">
                    <a href="{% url 'hospital:insurance_company_detail' company.pk %}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left me-2"></i>Cancel
                    </a>
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="bi bi-check-circle me-2"></i>Create Insurance Plan
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
