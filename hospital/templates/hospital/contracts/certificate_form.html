{% extends 'hospital/base.html' %}
{% load static %}

{% block content %}
<div class="container" style="max-width: 900px; margin: 40px auto;">
    <div class="card">
        <div class="card-header bg-success text-white">
            <h4 class="mb-0"><i class="bi bi-award me-2"></i>Add New Certificate</h4>
        </div>
        <div class="card-body">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                
                <!-- Basic Info -->
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Certificate Number *</label>
                        <input type="text" name="certificate_number" class="form-control" required title="Enter text" placeholder="Enter text">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Certificate Type *</label>
                        <select name="certificate_type" class="form-select" required title="Select option" aria-label="Select option">
                            <option value="license">Operating License</option>
                            <option value="accreditation">Accreditation</option>
                            <option value="certification">Certification</option>
                            <option value="permit">Permit</option>
                            <option value="registration">Registration</option>
                            <option value="insurance">Insurance Policy</option>
                            <option value="compliance">Compliance Document</option>
                            <option value="quality">Quality Certification</option>
                            <option value="staff">Staff License/Certification</option>
                            <option value="equipment">Equipment Certification</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Certificate Name *</label>
                    <input type="text" name="certificate_name" class="form-control" required placeholder="e.g., Hospital Operating License 2025" title="Enter text" placeholder="Enter text">
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Issuing Authority *</label>
                    <input type="text" name="issuing_authority" class="form-control" required placeholder="e.g., Ministry of Health" title="Enter text" placeholder="Enter text">
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Description *</label>
                    <textarea name="description" class="form-control" rows="3" required></textarea>
                </div>
                
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold">Issue Date *</label>
                        <input type="date" name="issue_date" class="form-control" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold">Expiry Date *</label>
                        <input type="date" name="expiry_date" class="form-control" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold">Alert Days Before</label>
                        <select name="alert_days_before" class="form-select" title="Select option" aria-label="Select option">
                            <option value="30">30 days</option>
                            <option value="60" selected>60 days</option>
                            <option value="90">90 days</option>
                        </select>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Upload Certificate (PDF/Image)</label>
                    <input type="file" name="certificate_document" class="form-control" accept=".pdf,.jpg,.jpeg,.png">
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Responsible Person</label>
                    <select name="responsible_person" class="form-select" title="Select option" aria-label="Select option">
                        <option value="">Select...</option>
                        {% for user in users %}
                        <option value="{{ user.id }}">{{ user.get_full_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Notes</label>
                    <textarea name="notes" class="form-control" rows="3"></textarea>
                </div>
                
                <div class="d-flex justify-content-between mt-4">
                    <a href="{% url 'hospital:contracts_dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn btn-success btn-lg">
                        <i class="bi bi-check-circle me-2"></i>Create Certificate
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
