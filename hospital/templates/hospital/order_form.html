{% extends 'hospital/base.html' %}
{% load humanize %}

{% block title %}{{ action }} Order{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="mb-1">{{ action }} Order</h2>
            <p class="text-muted mb-0">Create investigations, medications, or imaging requests</p>
        </div>
        <a href="{% url 'hospital:orders_list' %}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Back to Orders
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Encounter</label>
                        <select class="form-select" name="encounter" required title="Select option" aria-label="Select option">
                            <option value="">Select encounter</option>
                            {% for encounter in encounters %}
                            <option value="{{ encounter.id }}">
                                {{ encounter.patient.full_name }} · {{ encounter.started_at|date:"M d, Y H:i" }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Order Type</label>
                        <select class="form-select" name="order_type" required title="Select option" aria-label="Select option">
                            <option value="lab">Laboratory</option>
                            <option value="imaging">Imaging</option>
                            <option value="medication">Medication</option>
                            <option value="procedure">Procedure</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Priority</label>
                        <select class="form-select" name="priority" title="Select option" aria-label="Select option">
                            <option value="routine">Routine</option>
                            <option value="urgent">Urgent</option>
                            <option value="stat">STAT</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Notes / Indication</label>
                        <textarea class="form-control" name="notes" rows="3" placeholder="Clinical justification, key symptoms, special instructions"></textarea>
                    </div>
                </div>

                <div class="mt-4 d-flex justify-content-end gap-3">
                    <a href="{% url 'hospital:orders_list' %}" class="btn btn-light">Cancel</a>
                    <button type="submit" class="btn btn-primary">{{ action }}</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
