{% extends 'hospital/base.html' %}
{% load crispy_forms_tags %}

{% block title %}{{ title|default:"Create Encounter" }} - HMS{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>{{ title|default:"Create New Encounter" }}</h1>
    <a href="{% url 'hospital:encounter_list' %}" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> Back to List
    </a>
</div>

<div class="card">
    <div class="card-body">
        {% crispy form %}
    </div>
</div>
{% endblock %}
