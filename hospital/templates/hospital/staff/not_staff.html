{% extends 'hospital/base.html' %}

{% block content %}
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body text-center p-5">
                    <i class="bi bi-person-x" style="font-size: 64px; color: #6b7280;"></i>
                    <h3 class="mt-4">Access Restricted</h3>
                    <p class="text-muted">
                        This dashboard is only available to registered staff members.
                        If you believe you should have access, please contact HR.
                    </p>
                    <a href="{% url 'hospital:dashboard' %}" class="btn btn-primary mt-3">
                        <i class="bi bi-arrow-left me-2"></i>Go to Main Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
