{% load static %}

<!-- Role-based Navigation -->
<div class="role-navigation">
    <div class="container-fluid">
        <div class="row">
            <div class="col-12">
                <div class="role-nav-card">
                    <h6 class="role-nav-title">
                        <i class="bi bi-person-badge me-2"></i>
                        Role Dashboards
                    </h6>
                    <div class="role-nav-buttons">
                        <!-- Doctor Dashboard -->
                        <a href="{% url 'hospital:doctor_dashboard' %}" class="role-nav-btn doctor">
                            <i class="bi bi-stethoscope"></i>
                            <span>Doctor</span>
                        </a>
                        
                        <!-- Nurse Dashboard -->
                        <a href="{% url 'hospital:nurse_dashboard' %}" class="role-nav-btn nurse">
                            <i class="bi bi-heart-pulse"></i>
                            <span>Nurse</span>
                        </a>
                        
                        <!-- Laboratory Control Center (main lab ops) -->
                        <a href="{% url 'hospital:laboratory_dashboard' %}" class="role-nav-btn lab">
                            <i class="bi bi-flask"></i>
                            <span>Lab Tech</span>
                        </a>
                        <!-- Lab Timetables (HOD / HR only; link is safe for all) -->
                        <a href="{% url 'hospital:staff_shift_list' %}" class="role-nav-btn lab">
                            <i class="bi bi-people-fill"></i>
                            <span>Lab Timetables</span>
                        </a>
                        
                        <!-- Pharmacist Dashboard -->
                        <a href="{% url 'hospital:pharmacist_dashboard' %}" class="role-nav-btn pharmacy">
                            <i class="bi bi-capsule"></i>
                            <span>Pharmacist</span>
                        </a>
                        
                        <!-- Radiologist Dashboard -->
                        <a href="{% url 'hospital:radiologist_dashboard' %}" class="role-nav-btn radiology">
                            <i class="bi bi-camera"></i>
                            <span>Radiologist</span>
                        </a>
                        
                        <!-- Receptionist Dashboard -->
                        <a href="{% url 'hospital:receptionist_dashboard' %}" class="role-nav-btn reception">
                            <i class="bi bi-telephone"></i>
                            <span>Reception</span>
                        </a>
                        
                        <!-- Cashier Dashboard -->
                        <a href="{% url 'hospital:cashier_dashboard_role' %}" class="role-nav-btn cashier">
                            <i class="bi bi-cash-stack"></i>
                            <span>Cashier</span>
                        </a>
                        
                        <!-- Admin Dashboard -->
                        <a href="{% url 'hospital:admin_dashboard' %}" class="role-nav-btn admin">
                            <i class="bi bi-gear"></i>
                            <span>Admin</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.role-navigation {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 20px 0;
    margin-bottom: 30px;
    border-radius: 0 0 20px 20px;
}

.role-nav-card {
    background: rgba(255, 255, 255, 0.95);
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    backdrop-filter: blur(10px);
}

.role-nav-title {
    color: #2c3e50;
    font-weight: 600;
    margin-bottom: 15px;
    text-align: center;
}

.role-nav-buttons {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 15px;
}

.role-nav-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 15px 10px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    font-weight: 500;
    font-size: 0.9rem;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}

.role-nav-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transition: left 0.5s;
}

.role-nav-btn:hover::before {
    left: 100%;
}

.role-nav-btn i {
    font-size: 1.5rem;
    margin-bottom: 8px;
}

.role-nav-btn span {
    font-size: 0.8rem;
    text-align: center;
}

.role-nav-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    color: white;
    text-decoration: none;
}

/* Role-specific colors */
.role-nav-btn.doctor {
    background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
}

.role-nav-btn.nurse {
    background: linear-gradient(135deg, #28a745 0%, #1e7e34 100%);
}

.role-nav-btn.lab {
    background: linear-gradient(135deg, #17a2b8 0%, #138496 100%);
}

.role-nav-btn.pharmacy {
    background: linear-gradient(135deg, #6f42c1 0%, #5a32a3 100%);
}

.role-nav-btn.radiology {
    background: linear-gradient(135deg, #fd7e14 0%, #e8590c 100%);
}

.role-nav-btn.reception {
    background: linear-gradient(135deg, #20c997 0%, #1a9d8a 100%);
}

.role-nav-btn.cashier {
    background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
}

.role-nav-btn.admin {
    background: linear-gradient(135deg, #6f42c1 0%, #e83e8c 100%);
}

/* Responsive adjustments */
@media (max-width: 768px) {
    .role-nav-buttons {
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
    }
    
    .role-nav-btn {
        padding: 12px 8px;
    }
    
    .role-nav-btn i {
        font-size: 1.2rem;
    }
    
    .role-nav-btn span {
        font-size: 0.7rem;
    }
}

@media (max-width: 576px) {
    .role-nav-buttons {
        grid-template-columns: repeat(2, 1fr);
    }
}
</style>
