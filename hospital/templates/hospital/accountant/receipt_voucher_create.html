{% extends 'hospital/base.html' %}
{% load static %}

{% block title %}Create Receipt Voucher - HMS{% endblock %}
{% block page_title %}Create Receipt Voucher{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-0 py-3">
                    <h4 class="mb-0"><i class="bi bi-plus-circle me-2"></i>Create Receipt Voucher</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Received From <span class="text-danger">*</span></label>
                                <input type="text" name="received_from" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Receipt Date <span class="text-danger">*</span></label>
                                <input type="date" name="receipt_date" class="form-control" value="{% now 'Y-m-d' %}" required>
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Amount <span class="text-danger">*</span></label>
                                <input type="number" name="amount" class="form-control" step="0.01" min="0" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Payment Method</label>
                                <select name="payment_method" class="form-select">
                                    <option value="cash">Cash</option>
                                    <option value="bank_transfer">Bank Transfer</option>
                                    <option value="mobile_money">Mobile Money</option>
                                    <option value="card">Card</option>
                                    <option value="cheque">Cheque</option>
                                </select>
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Revenue Account <span class="text-danger">*</span></label>
                                <select name="revenue_account" class="form-select" required>
                                    <option value="">Select Revenue Account</option>
                                    {% for account in revenue_accounts %}
                                    <option value="{{ account.id }}">{{ account.account_code }} - {{ account.account_name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Cash Account <span class="text-danger">*</span></label>
                                <select name="cash_account" class="form-select" required>
                                    <option value="">Select Cash Account</option>
                                    {% for account in cash_accounts %}
                                    <option value="{{ account.id }}">{{ account.account_code }} - {{ account.account_name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Patient (Optional)</label>
                            <select name="patient" class="form-select">
                                <option value="">No Patient</option>
                                {% for patient in patients %}
                                <option value="{{ patient.id }}">{{ patient.full_name }} ({{ patient.mrn }})</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Description <span class="text-danger">*</span></label>
                            <textarea name="description" class="form-control" rows="3" required></textarea>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Reference</label>
                            <input type="text" name="reference" class="form-control" placeholder="Optional reference">
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{% url 'hospital:receipt_voucher_list' %}" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left me-2"></i>Cancel
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle me-2"></i>Create Receipt Voucher
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
