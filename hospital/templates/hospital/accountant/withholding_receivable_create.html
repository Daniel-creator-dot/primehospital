{% extends 'hospital/base.html' %}
{% load static %}

{% block title %}Add Withholding Receivable - HMS{% endblock %}
{% block page_title %}Add Withholding Receivable{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-0 py-3">
                    <h4 class="mb-0"><i class="bi bi-plus-circle me-2"></i>Add Withholding Receivable</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Payer <span class="text-danger">*</span></label>
                                <input type="text" name="payer" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Withholding Date <span class="text-danger">*</span></label>
                                <input type="date" name="withholding_date" class="form-control" value="{% now 'Y-m-d' %}" required>
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Amount Withheld <span class="text-danger">*</span></label>
                                <input type="number" name="amount_withheld" class="form-control" step="0.01" min="0" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Receivable Account <span class="text-danger">*</span></label>
                                <select name="receivable_account" class="form-select" required>
                                    <option value="">Select Account</option>
                                    {% for account in receivable_accounts %}
                                    <option value="{{ account.id }}">{{ account.account_code }} - {{ account.account_name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Expected Recovery Date</label>
                            <input type="date" name="expected_recovery_date" class="form-control">
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Description <span class="text-danger">*</span></label>
                            <textarea name="description" class="form-control" rows="3" required></textarea>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{% url 'hospital:withholding_receivable_list' %}" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left me-2"></i>Cancel
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle me-2"></i>Create Withholding Receivable
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
