{% extends 'hospital/base.html' %}
{% load static %}

{% block title %}Edit Revaluation - HMS{% endblock %}
{% block page_title %}Edit Initial Revaluation{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Edit Revaluation: {{ revaluation.revaluation_number }}</h5>
                    <a href="{% url 'hospital:initial_revaluation_detail' revaluation.id %}" class="btn btn-secondary btn-sm">
                        <i class="bi bi-arrow-left me-1"></i>Back
                    </a>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Account <span class="text-danger">*</span></label>
                                <select name="account" class="form-select" required>
                                    {% for account in asset_accounts %}
                                    <option value="{{ account.id }}" {% if account.id == revaluation.account.id %}selected{% endif %}>{{ account.account_code }} - {{ account.account_name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Revaluation Date <span class="text-danger">*</span></label>
                                <input type="date" name="revaluation_date" class="form-control" value="{{ revaluation.revaluation_date|date:'Y-m-d' }}" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Effective Date <span class="text-danger">*</span></label>
                            <input type="date" name="effective_date" class="form-control" value="{{ revaluation.effective_date|date:'Y-m-d' }}" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Asset Description <span class="text-danger">*</span></label>
                            <input type="text" name="asset_description" class="form-control" value="{{ revaluation.asset_description }}" required>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Previous Value <span class="text-danger">*</span></label>
                                <input type="number" name="previous_value" class="form-control" step="0.01" min="0" value="{{ revaluation.previous_value }}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">New Value <span class="text-danger">*</span></label>
                                <input type="number" name="new_value" class="form-control" step="0.01" min="0" value="{{ revaluation.new_value }}" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Reason <span class="text-danger">*</span></label>
                            <textarea name="reason" class="form-control" rows="3" required>{{ revaluation.reason }}</textarea>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{% url 'hospital:initial_revaluation_detail' revaluation.id %}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-circle me-2"></i>Cancel
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle me-2"></i>Update Revaluation
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
