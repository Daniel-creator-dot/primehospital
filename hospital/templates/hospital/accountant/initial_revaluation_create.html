{% extends 'hospital/base.html' %}
{% load static %}

{% block title %}Add Revaluation - HMS{% endblock %}
{% block page_title %}Add Initial Revaluation{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-0 py-3">
                    <h4 class="mb-0"><i class="bi bi-plus-circle me-2"></i>Add Initial Revaluation</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Account <span class="text-danger">*</span></label>
                                <select name="account" class="form-select" required>
                                    <option value="">Select Account</option>
                                    {% for account in asset_accounts %}
                                    <option value="{{ account.id }}">{{ account.account_code }} - {{ account.account_name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Revaluation Date <span class="text-danger">*</span></label>
                                <input type="date" name="revaluation_date" class="form-control" value="{% now 'Y-m-d' %}" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Effective Date <span class="text-danger">*</span></label>
                            <input type="date" name="effective_date" class="form-control" value="{% now 'Y-m-d' %}" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Asset Description <span class="text-danger">*</span></label>
                            <input type="text" name="asset_description" class="form-control" required>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Previous Value <span class="text-danger">*</span></label>
                                <input type="number" name="previous_value" class="form-control" step="0.01" min="0" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">New Value <span class="text-danger">*</span></label>
                                <input type="number" name="new_value" class="form-control" step="0.01" min="0" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Reason <span class="text-danger">*</span></label>
                            <textarea name="reason" class="form-control" rows="3" required></textarea>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{% url 'hospital:initial_revaluation_list' %}" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left me-2"></i>Cancel
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle me-2"></i>Create Revaluation
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
