{% extends 'hospital/base.html' %}
{% load static %}

{% block title %}Edit Revenue - HMS{% endblock %}
{% block page_title %}Edit Revenue Entry{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Edit Revenue: {{ revenue.revenue_number }}</h5>
                    <a href="{% url 'hospital:revenue_detail' revenue.id %}" class="btn btn-secondary btn-sm">
                        <i class="bi bi-arrow-left me-1"></i>Back
                    </a>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Category <span class="text-danger">*</span></label>
                                <select name="category" class="form-select" required>
                                    {% for cat in categories %}
                                    <option value="{{ cat.id }}" {% if cat.id == revenue.category.id %}selected{% endif %}>{{ cat.code }} - {{ cat.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Revenue Date <span class="text-danger">*</span></label>
                                <input type="date" name="revenue_date" class="form-control" value="{{ revenue.revenue_date|date:'Y-m-d' }}" required>
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Amount <span class="text-danger">*</span></label>
                                <input type="number" name="amount" class="form-control" step="0.01" min="0" value="{{ revenue.amount }}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Payment Method</label>
                                <select name="payment_method" class="form-select">
                                    <option value="cash" {% if revenue.payment_method == 'cash' %}selected{% endif %}>Cash</option>
                                    <option value="bank_transfer" {% if revenue.payment_method == 'bank_transfer' %}selected{% endif %}>Bank Transfer</option>
                                    <option value="mobile_money" {% if revenue.payment_method == 'mobile_money' %}selected{% endif %}>Mobile Money</option>
                                    <option value="card" {% if revenue.payment_method == 'card' %}selected{% endif %}>Card</option>
                                    <option value="cheque" {% if revenue.payment_method == 'cheque' %}selected{% endif %}>Cheque</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Patient (Optional)</label>
                            <select name="patient" class="form-select">
                                <option value="">No Patient</option>
                                {% for patient in patients %}
                                <option value="{{ patient.id }}" {% if revenue.patient and patient.id == revenue.patient.id %}selected{% endif %}>{{ patient.full_name }} ({{ patient.mrn }})</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Description <span class="text-danger">*</span></label>
                            <textarea name="description" class="form-control" rows="3" required>{{ revenue.description }}</textarea>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Reference</label>
                            <input type="text" name="reference" class="form-control" value="{{ revenue.reference|default:'' }}" placeholder="Optional reference number">
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{% url 'hospital:revenue_detail' revenue.id %}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-circle me-2"></i>Cancel
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle me-2"></i>Update Revenue Entry
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
