{% extends 'hospital/base.html' %}
{% load static %}

{% block title %}Edit Bank Transaction - HMS{% endblock %}
{% block page_title %}Edit Bank Transaction{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Edit Bank Transaction</h5>
                    <a href="{% url 'hospital:bank_transaction_detail' transaction.id %}" class="btn btn-secondary btn-sm">
                        <i class="bi bi-arrow-left me-1"></i>Back
                    </a>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Bank Account <span class="text-danger">*</span></label>
                                <select name="bank_account" class="form-select" required>
                                    {% for bank in bank_accounts %}
                                    <option value="{{ bank.id }}" {% if bank.id == transaction.bank_account.id %}selected{% endif %}>{{ bank.bank_name }} - {{ bank.account_number }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Transaction Date <span class="text-danger">*</span></label>
                                <input type="date" name="transaction_date" class="form-control" value="{{ transaction.transaction_date|date:'Y-m-d' }}" required>
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Transaction Type <span class="text-danger">*</span></label>
                                <select name="transaction_type" class="form-select" required>
                                    <option value="deposit" {% if transaction.transaction_type == 'deposit' %}selected{% endif %}>Deposit</option>
                                    <option value="withdrawal" {% if transaction.transaction_type == 'withdrawal' %}selected{% endif %}>Withdrawal</option>
                                    <option value="transfer" {% if transaction.transaction_type == 'transfer' %}selected{% endif %}>Transfer</option>
                                    <option value="fee" {% if transaction.transaction_type == 'fee' %}selected{% endif %}>Bank Fee</option>
                                    <option value="interest" {% if transaction.transaction_type == 'interest' %}selected{% endif %}>Interest</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Amount <span class="text-danger">*</span></label>
                                <input type="number" name="amount" class="form-control" step="0.01" min="0" value="{{ transaction.amount }}" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Description <span class="text-danger">*</span></label>
                            <textarea name="description" class="form-control" rows="2" required>{{ transaction.description }}</textarea>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Reference</label>
                            <input type="text" name="reference" class="form-control" value="{{ transaction.reference|default:'' }}">
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{% url 'hospital:bank_transaction_detail' transaction.id %}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-circle me-2"></i>Cancel
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle me-2"></i>Update Transaction
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
