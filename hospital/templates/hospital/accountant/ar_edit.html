{% extends 'hospital/base.html' %}
{% load static humanize %}

{% block title %}Edit AR - HMS{% endblock %}
{% block page_title %}Edit Accounts Receivable{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Edit AR Entry</h5>
                    <a href="{% url 'hospital:ar_detail' ar.id %}" class="btn btn-secondary btn-sm">
                        <i class="bi bi-arrow-left me-1"></i>Back
                    </a>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Invoice Amount <span class="text-danger">*</span></label>
                                <input type="number" name="invoice_amount" class="form-control" step="0.01" min="0" value="{{ ar.invoice_amount }}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Amount Paid</label>
                                <input type="number" name="amount_paid" class="form-control" step="0.01" min="0" value="{{ ar.amount_paid }}">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Due Date <span class="text-danger">*</span></label>
                            <input type="date" name="due_date" class="form-control" value="{{ ar.due_date|date:'Y-m-d' }}" required>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{% url 'hospital:ar_detail' ar.id %}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-circle me-2"></i>Cancel
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle me-2"></i>Update AR Entry
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
