{% extends 'hospital/base.html' %}
{% load static %}

{% block title %}Add Deposit - HMS{% endblock %}
{% block page_title %}Add Deposit{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-0 py-3">
                    <h4 class="mb-0"><i class="bi bi-plus-circle me-2"></i>Add Deposit</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Deposit Type <span class="text-danger">*</span></label>
                                <select name="deposit_type" class="form-select" required>
                                    <option value="">Select Type</option>
                                    <option value="from">Deposit From</option>
                                    <option value="to">Deposit To</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Deposit Date <span class="text-danger">*</span></label>
                                <input type="date" name="deposit_date" class="form-control" value="{% now 'Y-m-d' %}" required>
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">From Account</label>
                                <select name="from_account" class="form-select">
                                    <option value="">No Account</option>
                                    {% for account in accounts %}
                                    <option value="{{ account.id }}">{{ account.account_code }} - {{ account.account_name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">To Account</label>
                                <select name="to_account" class="form-select">
                                    <option value="">No Account</option>
                                    {% for account in accounts %}
                                    <option value="{{ account.id }}">{{ account.account_code }} - {{ account.account_name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">From Bank Account</label>
                                <select name="from_bank_account" class="form-select">
                                    <option value="">No Bank Account</option>
                                    {% for bank in bank_accounts %}
                                    <option value="{{ bank.id }}">{{ bank.bank_name }} - {{ bank.account_number }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">To Bank Account</label>
                                <select name="to_bank_account" class="form-select">
                                    <option value="">No Bank Account</option>
                                    {% for bank in bank_accounts %}
                                    <option value="{{ bank.id }}">{{ bank.bank_name }} - {{ bank.account_number }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Amount <span class="text-danger">*</span></label>
                                <input type="number" name="amount" class="form-control" step="0.01" min="0" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Reference</label>
                                <input type="text" name="reference" class="form-control" placeholder="Optional reference">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Description <span class="text-danger">*</span></label>
                            <textarea name="description" class="form-control" rows="3" required></textarea>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{% url 'hospital:deposit_list' %}" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left me-2"></i>Cancel
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle me-2"></i>Create Deposit
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
