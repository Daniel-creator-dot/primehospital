{% extends 'hospital/base.html' %}
{% load static %}

{% block title %}Edit Deposit - HMS{% endblock %}
{% block page_title %}Edit Deposit{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Edit Deposit: {{ deposit.deposit_number }}</h5>
                    <a href="{% url 'hospital:deposit_detail' deposit.id %}" class="btn btn-secondary btn-sm">
                        <i class="bi bi-arrow-left me-1"></i>Back
                    </a>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Deposit Type <span class="text-danger">*</span></label>
                                <select name="deposit_type" class="form-select" required>
                                    <option value="from" {% if deposit.deposit_type == 'from' %}selected{% endif %}>Deposit From</option>
                                    <option value="to" {% if deposit.deposit_type == 'to' %}selected{% endif %}>Deposit To</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Deposit Date <span class="text-danger">*</span></label>
                                <input type="date" name="deposit_date" class="form-control" value="{{ deposit.deposit_date|date:'Y-m-d' }}" required>
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">From Account</label>
                                <select name="from_account" class="form-select">
                                    <option value="">No Account</option>
                                    {% for account in accounts %}
                                    <option value="{{ account.id }}" {% if deposit.from_account and account.id == deposit.from_account.id %}selected{% endif %}>{{ account.account_code }} - {{ account.account_name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">To Account</label>
                                <select name="to_account" class="form-select">
                                    <option value="">No Account</option>
                                    {% for account in accounts %}
                                    <option value="{{ account.id }}" {% if deposit.to_account and account.id == deposit.to_account.id %}selected{% endif %}>{{ account.account_code }} - {{ account.account_name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">From Bank Account</label>
                                <select name="from_bank_account" class="form-select">
                                    <option value="">No Bank Account</option>
                                    {% for bank in bank_accounts %}
                                    <option value="{{ bank.id }}" {% if deposit.from_bank_account and bank.id == deposit.from_bank_account.id %}selected{% endif %}>{{ bank.bank_name }} - {{ bank.account_number }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">To Bank Account</label>
                                <select name="to_bank_account" class="form-select">
                                    <option value="">No Bank Account</option>
                                    {% for bank in bank_accounts %}
                                    <option value="{{ bank.id }}" {% if deposit.to_bank_account and bank.id == deposit.to_bank_account.id %}selected{% endif %}>{{ bank.bank_name }} - {{ bank.account_number }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Amount <span class="text-danger">*</span></label>
                                <input type="number" name="amount" class="form-control" step="0.01" min="0" value="{{ deposit.amount }}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Reference</label>
                                <input type="text" name="reference" class="form-control" value="{{ deposit.reference|default:'' }}">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Description <span class="text-danger">*</span></label>
                            <textarea name="description" class="form-control" rows="3" required>{{ deposit.description }}</textarea>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{% url 'hospital:deposit_detail' deposit.id %}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-circle me-2"></i>Cancel
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle me-2"></i>Update Deposit
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
