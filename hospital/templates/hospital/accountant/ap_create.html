{% extends 'hospital/base.html' %}
{% load static %}

{% block title %}Add Accounts Payable - HMS{% endblock %}
{% block page_title %}Add Accounts Payable Entry{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-0 py-3">
                    <h4 class="mb-0"><i class="bi bi-plus-circle me-2"></i>Add Accounts Payable Entry</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Vendor Name <span class="text-danger">*</span></label>
                                <input type="text" name="vendor_name" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Vendor Invoice Number</label>
                                <input type="text" name="vendor_invoice" class="form-control">
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Bill Date <span class="text-danger">*</span></label>
                                <input type="date" name="bill_date" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Due Date <span class="text-danger">*</span></label>
                                <input type="date" name="due_date" class="form-control" required>
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Amount <span class="text-danger">*</span></label>
                                <input type="number" name="amount" class="form-control" step="0.01" min="0" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Supply Type</label>
                                <select name="supply_type" class="form-select">
                                    <option value="goods">Goods (3% WHT)</option>
                                    <option value="works">Works (5% WHT)</option>
                                    <option value="local_services">Local Services (7.5% WHT)</option>
                                    <option value="foreign_services">Foreign Services (20% WHT)</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Description <span class="text-danger">*</span></label>
                            <textarea name="description" class="form-control" rows="3" required></textarea>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{% url 'hospital:ap_list' %}" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left me-2"></i>Cancel
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle me-2"></i>Create AP Entry
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
