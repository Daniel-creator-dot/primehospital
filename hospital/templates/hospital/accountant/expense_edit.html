{% extends 'hospital/base.html' %}
{% load static %}

{% block title %}Edit Expense - HMS{% endblock %}
{% block page_title %}Edit Expense Entry{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Edit Expense: {{ expense.expense_number }}</h5>
                    <a href="{% url 'hospital:expense_detail' expense.id %}" class="btn btn-secondary btn-sm">
                        <i class="bi bi-arrow-left me-1"></i>Back
                    </a>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Category <span class="text-danger">*</span></label>
                                <select name="category" class="form-select" required>
                                    {% for cat in categories %}
                                    <option value="{{ cat.id }}" {% if cat.id == expense.category.id %}selected{% endif %}>{{ cat.code }} - {{ cat.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Expense Date <span class="text-danger">*</span></label>
                                <input type="date" name="expense_date" class="form-control" value="{{ expense.expense_date|date:'Y-m-d' }}" required>
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Vendor Name <span class="text-danger">*</span></label>
                                <input type="text" name="vendor_name" class="form-control" value="{{ expense.vendor_name }}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Vendor Invoice Number</label>
                                <input type="text" name="vendor_invoice" class="form-control" value="{{ expense.vendor_invoice_number }}">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Amount <span class="text-danger">*</span></label>
                            <input type="number" name="amount" class="form-control" step="0.01" min="0" value="{{ expense.amount }}" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Description <span class="text-danger">*</span></label>
                            <textarea name="description" class="form-control" rows="3" required>{{ expense.description }}</textarea>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{% url 'hospital:expense_detail' expense.id %}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-circle me-2"></i>Cancel
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle me-2"></i>Update Expense Entry
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
