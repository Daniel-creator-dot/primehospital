{% extends 'hospital/base.html' %}
{% load static %}

{% block title %}Add Accounts Receivable - HMS{% endblock %}
{% block page_title %}Add Accounts Receivable Entry{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-0 py-3">
                    <h4 class="mb-0"><i class="bi bi-plus-circle me-2"></i>Add Accounts Receivable Entry</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Patient <span class="text-danger">*</span></label>
                                <select name="patient" class="form-select" required>
                                    <option value="">Select Patient</option>
                                    {% for patient in patients %}
                                    <option value="{{ patient.id }}">{{ patient.full_name }} ({{ patient.mrn }})</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Invoice (Optional)</label>
                                <select name="invoice" class="form-select">
                                    <option value="">No Invoice (Manual Entry)</option>
                                    {% for invoice in invoices %}
                                    <option value="{{ invoice.id }}">{{ invoice.invoice_number }} - GHS {{ invoice.total_amount|floatformat:2 }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Invoice Amount <span class="text-danger">*</span></label>
                                <input type="number" name="invoice_amount" class="form-control" step="0.01" min="0" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Due Date <span class="text-danger">*</span></label>
                                <input type="date" name="due_date" class="form-control" required>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{% url 'hospital:ar_list' %}" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left me-2"></i>Cancel
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle me-2"></i>Create AR Entry
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
