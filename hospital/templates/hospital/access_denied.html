{% extends 'hospital/base.html' %}
{% load static %}

{% block title %}Access Denied{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body text-center py-5">
                    <i class="bi bi-shield-exclamation text-danger" style="font-size: 4rem;"></i>
                    <h2 class="mt-3 mb-3">Access Denied</h2>
                    <p class="text-muted mb-4">{{ message|default:"You do not have permission to access this page." }}</p>
                    <a href="{{ dashboard_url|default:'/hms/' }}" class="btn btn-primary">
                        <i class="bi bi-house me-1"></i>Return to Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
