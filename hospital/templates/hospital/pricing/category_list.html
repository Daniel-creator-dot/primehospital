{% extends 'hospital/base.html' %}
{% load static %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-folder me-2"></i>Pricing Categories</h2>
        <a href="{% url 'hospital:pricing_category_create' %}" class="btn btn-warning">
            <i class="bi bi-plus-circle me-2"></i>Add New Category
        </a>
    </div>
    
    <div class="row">
        {% for category in categories %}
        <div class="col-md-4 mb-4">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title">{{ category.name }}</h5>
                    <p class="text-muted">{{ category.code }}</p>
                    <p>{{ category.description }}</p>
                    <p><strong>Services:</strong> {{ category.prices_count }}</p>
                    <a href="{% url 'hospital:pricing_category_detail' category.pk %}" class="btn btn-primary">
                        View Details
                    </a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
