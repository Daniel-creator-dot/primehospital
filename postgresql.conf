# World-Class PostgreSQL Configuration
# Optimized for high-performance database operations

# Memory Settings
shared_buffers = 256MB              # 25% of RAM for dedicated server
effective_cache_size = 1GB          # 50-75% of total RAM
maintenance_work_mem = 128MB        # For VACUUM, CREATE INDEX, etc.
work_mem = 16MB                     # Per-operation memory
wal_buffers = 16MB                  # WAL write buffer

# Checkpoint Settings
checkpoint_completion_target = 0.9  # Spread checkpoints over time
min_wal_size = 1GB                 # Minimum WAL size
max_wal_size = 4GB                  # Maximum WAL size

# Query Planner
default_statistics_target = 100     # Statistics detail level
random_page_cost = 1.1              # SSD-optimized
effective_io_concurrency = 200      # Concurrent I/O operations

# Connection Settings
max_connections = 200               # Maximum concurrent connections
max_worker_processes = 4            # Background worker processes
max_parallel_workers_per_gather = 2 # Parallel query workers
max_parallel_workers = 4            # Total parallel workers

# Logging
log_statement = 'all'               # Log all statements
log_duration = on                   # Log query duration
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_timezone = 'UTC'
timezone = 'UTC'

# Performance
synchronous_commit = on             # Data safety
wal_level = replica                 # WAL level for replication
max_wal_senders = 3                 # WAL senders for replication

# Autovacuum (automatic maintenance)
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.2
autovacuum_analyze_scale_factor = 0.1





