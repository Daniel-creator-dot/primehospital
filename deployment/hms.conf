[program:hms]
directory=/var/www/hms
command=/var/www/hms/venv/bin/gunicorn hms.wsgi:application 
    --bind 0.0.0.0:8000
    --workers 4
    --worker-class sync
    --timeout 120
    --max-requests 1000
    --max-requests-jitter 50
    --access-logfile /var/log/hms/gunicorn-access.log
    --error-logfile /var/log/hms/gunicorn-error.log
    --log-level info
    --capture-output

user=www-data
group=www-data
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/var/log/hms/gunicorn.log
stderr_logfile=/var/log/hms/gunicorn-error.log

environment=
    PATH="/var/www/hms/venv/bin",
    DJANGO_SETTINGS_MODULE="hms.settings",
    PYTHONPATH="/var/www/hms"

stopwaitsecs=60

















